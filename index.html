document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9c374d0b-3729-4e06-b731-275e4721d86b\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://cdn.jsdelivr.net\">\n<script>\n(function(){try{var l=document.createElement('link');l.rel='stylesheet';l.href='https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css';document.head.appendChild(l);}catch(e){}})();\n<\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  html,body{margin:0;padding:0;}\n  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:#F3F4FB;color:#1E1B3A;-webkit-font-smoothing:antialiased;}\n  input,textarea,button,select{font-family:inherit;}\n  textarea{resize:vertical;}\n  button{cursor:pointer;border:none;background:none;}\n  ::-webkit-scrollbar{width:10px;height:10px;}\n  ::-webkit-scrollbar-thumb{background:#D7D5EA;border-radius:10px;border:3px solid #F3F4FB;}\n  ::-webkit-scrollbar-track{background:transparent;}\n  @keyframes spin{to{transform:rotate(360deg);}}\n  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}\n  @keyframes blink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}\n  @keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"display:flex; min-height:100vh; width:100%; background:#F3F4FB;\">\n\n  <sc-if value=\"{{ showSidebar }}\" hint-placeholder-val=\"{{ true }}\">\n    <aside style=\"width:248px; flex:none; background:#FFFFFF; border-right:1px solid #ECEAF6; padding:22px 16px; display:flex; flex-direction:column; gap:6px; position:sticky; top:0; height:100vh;\">\n      <div style=\"display:flex; align-items:center; gap:11px; padding:6px 8px 18px;\">\n        <div style=\"width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg,#5B5BF5,#8B5CF6); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(99,91,245,.32);\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 18h6\"><\u002Fpath><path d=\"M10 21h4\"><\u002Fpath><path d=\"M12 3a6 6 0 00-4 10c.8.9 1 1.7 1 3h6c0-1.3.2-2.1 1-3a6 6 0 00-4-10z\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:17px; font-weight:800; letter-spacing:-.4px;\">발명노트<\u002Fdiv>\n          <div style=\"font-size:11px; color:#908DA6; font-weight:600; margin-top:1px;\">발명·특허 학습 코치<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-for list=\"{{ nav }}\" as=\"item\" hint-placeholder-count=\"8\">\n        <button onclick=\"{{ item.onClick }}\" style=\"{{ item.btnStyle }}\">\n          <span style=\"display:flex; align-items:center; justify-content:center; width:22px; height:22px;\">{{ item.icon }}<\u002Fspan>\n          <span>{{ item.label }}<\u002Fspan>\n          <sc-if value=\"{{ item.badge }}\" hint-placeholder-val=\"\">\n            <span style=\"margin-left:auto; font-size:10.5px; font-weight:800; background:#FFE8A3; color:#8A6D00; padding:2px 7px; border-radius:20px;\">{{ item.badge }}<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n      <div style=\"margin-top:auto; background:#F5F3FF; border:1px solid #ECE7FF; border-radius:14px; padding:13px 14px;\">\n        <div style=\"font-size:12px; font-weight:800; color:#6D4AFF; margin-bottom:4px;\">예시 발명으로 둘러보는 중<\u002Fdiv>\n        <div style=\"font-size:11.5px; line-height:1.5; color:#7C7990;\">자동 우산 건조 보관함 데이터가 미리 채워져 있어요.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fsc-if>\n\n  <div style=\"flex:1; min-width:0; display:flex; flex-direction:column;\">\n    <header style=\"position:sticky; top:0; z-index:20; background:rgba(243,244,251,.82); backdrop-filter:blur(10px); border-bottom:1px solid #ECEAF6; padding:14px 26px; display:flex; align-items:center; gap:14px;\">\n      <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"\">\n        <div style=\"width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#5B5BF5,#8B5CF6); display:flex; align-items:center; justify-content:center;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3a6 6 0 00-4 10c.8.9 1 1.7 1 3h6c0-1.3.2-2.1 1-3a6 6 0 00-4-10z\"><\u002Fpath><path d=\"M9 18h6\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <div>\n        <div style=\"font-size:18px; font-weight:800; letter-spacing:-.5px;\">{{ screenTitle }}<\u002Fdiv>\n        <div style=\"font-size:12.5px; color:#908DA6; font-weight:500; margin-top:1px;\">{{ screenSub }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-left:auto; display:flex; align-items:center; gap:12px;\">\n        <div style=\"display:flex; align-items:center; gap:8px; background:#fff; border:1px solid #ECEAF6; border-radius:30px; padding:5px 14px 5px 6px;\">\n          <div style=\"width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#FFD64D,#FFB23E); display:flex; align-items:center; justify-content:center; font-size:14px;\">🙂<\u002Fdiv>\n          <span style=\"font-size:12.5px; font-weight:700; color:#3A3651;\">발명대회 준비생<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <main style=\"flex:1; padding:26px; padding-bottom:96px; max-width:1080px; width:100%; margin:0 auto;\">\n\n      <sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"animation:fadeUp .4s ease;\">\n          <div style=\"display:flex; gap:18px; align-items:stretch; background:linear-gradient(120deg,#5B5BF5,#7C4DFF 60%,#9333EA); border-radius:22px; padding:26px 28px; color:#fff; position:relative; overflow:hidden; box-shadow:0 16px 36px rgba(91,91,245,.28);\">\n            <div style=\"position:absolute; right:-30px; top:-30px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.08);\"><\u002Fdiv>\n            <div style=\"position:absolute; right:60px; bottom:-50px; width:120px; height:120px; border-radius:50%; background:rgba(255,255,255,.06);\"><\u002Fdiv>\n            <div style=\"flex:1; min-width:0; position:relative;\">\n              <div style=\"font-size:13px; font-weight:700; opacity:.85; margin-bottom:6px;\">반가워요, 예비 발명가님 👋<\u002Fdiv>\n              <div style=\"font-size:25px; font-weight:800; letter-spacing:-.6px; line-height:1.32; margin-bottom:14px; text-wrap:pretty;\">아이디어를 특허로,<br>한 단계씩 같이 만들어가요.<\u002Fdiv>\n              <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n                <button onclick=\"{{ goIdea }}\" style=\"background:#fff; color:#5B3DDB; font-weight:800; font-size:13.5px; padding:11px 18px; border-radius:12px; box-shadow:0 6px 14px rgba(0,0,0,.12);\">＋ 새 발명 시작하기<\u002Fbutton>\n                <button onclick=\"{{ goCoach }}\" style=\"background:rgba(255,255,255,.16); color:#fff; font-weight:700; font-size:13.5px; padding:11px 18px; border-radius:12px; border:1px solid rgba(255,255,255,.3);\">AI 코치에게 물어보기<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:118px; flex:none; display:flex; align-items:flex-end; justify-content:center; position:relative;\">\n              <div style=\"animation:floaty 3.5s ease-in-out infinite;\">{{ mascotLarge }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:20px; padding:22px 24px; margin-top:18px;\">\n            <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:18px;\">\n              <div style=\"font-size:15.5px; font-weight:800;\">발명 → 특허 진행 단계<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#908DA6; font-weight:600;\">3 / 7 단계 진행 중<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:0; overflow-x:auto; padding-bottom:6px;\">\n              <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"7\">\n                <button onclick=\"{{ st.onClick }}\" style=\"flex:1; min-width:118px; display:flex; flex-direction:column; align-items:center; gap:9px; background:none; position:relative; padding:0 4px;\">\n                  <div style=\"position:absolute; top:17px; left:50%; right:-50%; height:3px; background:{{ st.lineColor }};\"><\u002Fdiv>\n                  <div style=\"width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; z-index:1; {{ st.dotStyle }}\">{{ st.dotLabel }}<\u002Fdiv>\n                  <div style=\"font-size:11.5px; font-weight:700; color:{{ st.textColor }}; text-align:center; line-height:1.35;\">{{ st.label }}<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:{{ gridCols }}; gap:16px; margin-top:18px;\">\n\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:20px; grid-column:span 1; position:relative; overflow:hidden;\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color:#6D4AFF; margin-bottom:10px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#6D4AFF;\"><\u002Fspan>오늘의 학습<\u002Fdiv>\n              <div style=\"font-size:16px; font-weight:800; line-height:1.4; margin-bottom:6px; text-wrap:pretty;\">청구항은 내 발명을<br>보호하는 울타리예요<\u002Fdiv>\n              <div style=\"font-size:12.5px; color:#7C7990; line-height:1.55; margin-bottom:16px;\">독립항과 종속항의 차이를 3분 안에 배워봐요.<\u002Fdiv>\n              <button onclick=\"{{ goLearn }}\" style=\"font-size:13px; font-weight:800; color:#6D4AFF; background:#F1EEFF; padding:9px 14px; border-radius:10px;\">학습하러 가기 →<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:20px;\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color:#0E9F6E; margin-bottom:12px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#0E9F6E;\"><\u002Fspan>명세서 작성 진행률<\u002Fdiv>\n              <div style=\"display:flex; align-items:flex-end; gap:6px; margin-bottom:12px;\"><span style=\"font-size:32px; font-weight:800; letter-spacing:-1px;\">60<\u002Fspan><span style=\"font-size:16px; font-weight:800; color:#908DA6; margin-bottom:5px;\">%<\u002Fspan><\u002Fdiv>\n              <div style=\"height:9px; background:#EDEBF7; border-radius:20px; overflow:hidden; margin-bottom:8px;\"><div style=\"height:100%; width:60%; background:linear-gradient(90deg,#10B981,#34D399); border-radius:20px;\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#908DA6; font-weight:600;\">10개 항목 중 6개 작성 완료<\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:20px;\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color:#E8950C; margin-bottom:12px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#E8950C;\"><\u002Fspan>출원 준비 체크리스트<\u002Fdiv>\n              <div style=\"display:flex; align-items:flex-end; gap:6px; margin-bottom:12px;\"><span style=\"font-size:32px; font-weight:800; letter-spacing:-1px;\">7<\u002Fspan><span style=\"font-size:16px; font-weight:800; color:#908DA6; margin-bottom:5px;\">/ 11<\u002Fspan><\u002Fdiv>\n              <div style=\"height:9px; background:#EDEBF7; border-radius:20px; overflow:hidden; margin-bottom:8px;\"><div style=\"height:100%; width:64%; background:linear-gradient(90deg,#F59E0B,#FBBF24); border-radius:20px;\"><\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ goFiling }}\" style=\"font-size:11.5px; color:#E8950C; font-weight:800;\">남은 항목 보기 →<\u002Fbutton>\n            <\u002Fdiv>\n\n            <div style=\"background:linear-gradient(135deg,#F5F3FF,#FFF); border:1px solid #ECE7FF; border-radius:18px; padding:20px; display:flex; flex-direction:column;\">\n              <div style=\"display:flex; align-items:center; gap:8px; font-size:12px; font-weight:800; color:#6D4AFF; margin-bottom:10px;\"><span style=\"width:7px; height:7px; border-radius:50%; background:#6D4AFF;\"><\u002Fspan>AI 발명 코치<\u002Fdiv>\n              <div style=\"font-size:13px; color:#5A5670; line-height:1.55; margin-bottom:14px; flex:1;\">\"내 발명의 차별점이 뭘까?\" 막힐 때 코치에게 편하게 물어보세요.<\u002Fdiv>\n              <button onclick=\"{{ goCoach }}\" style=\"font-size:13px; font-weight:800; color:#fff; background:linear-gradient(135deg,#6D4AFF,#9333EA); padding:10px 14px; border-radius:11px;\">코치와 대화하기<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:22px;\">\n            <div style=\"display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px;\">\n              <div style=\"font-size:15.5px; font-weight:800;\">최근 작성한 아이디어<\u002Fdiv>\n              <button onclick=\"{{ goIdea }}\" style=\"font-size:12.5px; color:#6D4AFF; font-weight:700;\">모두 보기<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:11px;\">\n              <sc-for list=\"{{ ideaList }}\" as=\"it\" hint-placeholder-count=\"2\">\n                <button onclick=\"{{ it.onClick }}\" style=\"text-align:left; background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:16px 18px; display:flex; align-items:center; gap:16px;\">\n                  <div style=\"width:46px; height:46px; flex:none; border-radius:13px; background:{{ it.iconBg }}; display:flex; align-items:center; justify-content:center; font-size:22px;\">{{ it.emoji }}<\u002Fdiv>\n                  <div style=\"flex:1; min-width:0;\">\n                    <div style=\"font-size:14.5px; font-weight:800; margin-bottom:3px;\">{{ it.title }}<\u002Fdiv>\n                    <div style=\"font-size:12px; color:#908DA6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ it.problem }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-size:11px; font-weight:800; padding:5px 11px; border-radius:20px; {{ it.statusStyle }}\">{{ it.status }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px; background:#FBFAFF; border:1px dashed #DDD6F3; border-radius:14px; padding:14px 18px; font-size:11.5px; color:#908DA6; line-height:1.6;\">\n            본 서비스는 발명·특허 학습과 출원 준비를 돕는 보조 도구입니다. 특허 가능성, 권리 범위, 출원 성공 여부를 보장하지 않으며, 실제 출원 전에는 특허청 공식 자료와 변리사 등 전문가 검토를 권장합니다.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isLearn }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease;\">\n          <div style=\"display:flex; gap:8px; background:#ECEAF6; padding:5px; border-radius:14px; max-width:340px; margin-bottom:20px;\">\n            <sc-for list=\"{{ learnTabs }}\" as=\"tb\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ tb.onClick }}\" style=\"{{ tb.style }}\">{{ tb.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:{{ gridCols }}; gap:14px;\">\n            <sc-for list=\"{{ conceptList }}\" as=\"c\" hint-placeholder-count=\"6\">\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:20px;\">\n                <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:11px;\">\n                  <div style=\"width:42px; height:42px; border-radius:12px; background:#F5F3FF; display:flex; align-items:center; justify-content:center; font-size:21px;\">{{ c.ico }}<\u002Fdiv>\n                  <div style=\"font-size:15px; font-weight:800; line-height:1.3;\">{{ c.t }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:13px; color:#6A6680; line-height:1.65;\">{{ c.b }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"background:linear-gradient(135deg,#FFFDF5,#fff); border:1px solid #F2E9C9; border-radius:20px; padding:24px; margin-top:22px;\">\n            <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:6px;\">\n              <span style=\"font-size:12px; font-weight:800; color:#C99700; background:#FFF3C9; padding:4px 10px; border-radius:20px;\">미니 퀴즈<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:17px; font-weight:800; margin:10px 0 16px; letter-spacing:-.3px;\">{{ quiz.question }}<\u002Fdiv>\n            <div style=\"display:flex; flex-direction:column; gap:9px; max-width:560px;\">\n              <sc-for list=\"{{ quiz.options }}\" as=\"op\" hint-placeholder-count=\"4\">\n                <button onclick=\"{{ op.onClick }}\" style=\"{{ op.style }}\">{{ op.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ quiz.done }}\" hint-placeholder-val=\"\">\n              <div style=\"margin-top:14px; padding:12px 15px; border-radius:12px; font-size:13px; font-weight:700; line-height:1.55; {{ quiz.resultStyle }}\">{{ quiz.resultText }}<\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"display:flex; gap:10px; margin-top:16px;\">\n              <sc-if value=\"{{ quiz.done }}\" hint-placeholder-val=\"\">\n                <button onclick=\"{{ quiz.reset }}\" style=\"font-size:13px; font-weight:800; color:#6D4AFF; background:#F1EEFF; padding:11px 18px; border-radius:11px;\">다시 풀기<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ quiz.canCheck }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ quiz.check }}\" style=\"font-size:13px; font-weight:800; padding:11px 22px; border-radius:11px; {{ quiz.checkStyle }}\">정답 확인<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isIdea }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease; max-width:760px;\">\n          <div style=\"display:flex; align-items:center; gap:14px; background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:16px 20px; margin-bottom:18px;\">\n            <div style=\"flex:none;\">{{ mascotLarge }}<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#5A5670; line-height:1.6;\">좋아요! 아래 질문에 편하게 답해보세요. 다 채우지 않아도 괜찮아요 — 먼저 <b style=\"color:#5B3DDB;\">초안<\u002Fb>을 만드는 게 가장 중요해요.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:9px;\">발명 제목<\u002Flabel>\n              <input value=\"{{ idea.title }}\" onchange=\"{{ ideaHandlers.title }}\" placeholder=\"예: 자동 우산 건조 보관함\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:14px; color:#1E1B3A; outline:none;\">\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:4px;\">어떤 불편함을 해결하고 싶나요?<\u002Flabel>\n              <div style=\"font-size:11.5px; color:#A6A2B8; margin-bottom:9px;\">해결하고 싶은 문제를 적어주세요.<\u002Fdiv>\n              <textarea value=\"{{ idea.problem }}\" onchange=\"{{ ideaHandlers.problem }}\" rows=\"2\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:4px;\">기존 제품·방법은 어떤 점이 부족했나요?<\u002Flabel>\n              <textarea value=\"{{ idea.existing }}\" onchange=\"{{ ideaHandlers.existing }}\" rows=\"2\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:4px;\">당신의 핵심 아이디어는 무엇인가요?<\u002Flabel>\n              <textarea value=\"{{ idea.core }}\" onchange=\"{{ ideaHandlers.core }}\" rows=\"2\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n            <\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:{{ gridCols }}; gap:16px;\">\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n                <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:9px;\">작동 방식<\u002Flabel>\n                <textarea value=\"{{ idea.how }}\" onchange=\"{{ ideaHandlers.how }}\" rows=\"3\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n                <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:9px;\">필요한 구성 요소<\u002Flabel>\n                <textarea value=\"{{ idea.components }}\" onchange=\"{{ ideaHandlers.components }}\" rows=\"3\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n                <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:9px;\">기존과 다른 점<\u002Flabel>\n                <textarea value=\"{{ idea.difference }}\" onchange=\"{{ ideaHandlers.difference }}\" rows=\"3\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n              <\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n                <label style=\"font-size:13px; font-weight:800; color:#3A3651; display:block; margin-bottom:9px;\">기대 효과<\u002Flabel>\n                <textarea value=\"{{ idea.effect }}\" onchange=\"{{ ideaHandlers.effect }}\" rows=\"3\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none;\"><\u002Ftextarea>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:linear-gradient(135deg,#F3F0FF,#fff); border:1px solid #E4DCFF; border-radius:18px; padding:22px; margin-top:18px;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap;\">\n              <div style=\"font-size:15px; font-weight:800; color:#5B3DDB;\">✨ 자동 생성된 발명 요약<\u002Fdiv>\n              <button onclick=\"{{ genSummary }}\" style=\"font-size:12.5px; font-weight:800; color:#fff; background:linear-gradient(135deg,#6D4AFF,#9333EA); padding:9px 16px; border-radius:10px;\">AI로 다시 생성<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ summaryLoading }}\" hint-placeholder-val=\"\">\n              <div style=\"display:flex; align-items:center; gap:10px; color:#8B88A0; font-size:13px;\"><span style=\"width:16px; height:16px; border:2.5px solid #D8D2F2; border-top-color:#6D4AFF; border-radius:50%; display:inline-block; animation:spin .7s linear infinite;\"><\u002Fspan>발명이가 요약을 작성하고 있어요…<\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ summary }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"background:#fff; border:1px solid #ECE7FF; border-radius:13px; padding:16px 18px; font-size:13.5px; line-height:1.75; color:#2A2640;\">{{ summary }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isResearch }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease; max-width:820px;\">\n          <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:20px 22px; margin-bottom:18px;\">\n            <div style=\"font-size:14.5px; font-weight:800; margin-bottom:5px;\">🔑 추천 검색 키워드<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#908DA6; margin-bottom:14px;\">입력한 발명 내용을 바탕으로 자동 추천된 키워드예요. KIPRIS·구글 특허에서 검색해 보세요.<\u002Fdiv>\n            <div style=\"display:flex; flex-wrap:wrap; gap:9px;\">\n              <sc-for list=\"{{ keywords }}\" as=\"kw\" hint-placeholder-count=\"5\">\n                <span style=\"font-size:13px; font-weight:700; color:#5B3DDB; background:#F1EEFF; border:1px solid #E4DCFF; padding:8px 14px; border-radius:30px;\">{{ kw }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid; grid-template-columns:{{ gridCols }}; gap:14px; margin-bottom:18px;\">\n            <a href=\"https://www.kipris.or.kr\" target=\"_blank\" style=\"text-decoration:none; background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px; display:flex; align-items:center; gap:14px;\">\n              <div style=\"width:44px; height:44px; flex:none; border-radius:12px; background:#E8EEFF; display:flex; align-items:center; justify-content:center; font-size:21px;\">🇰🇷<\u002Fdiv>\n              <div><div style=\"font-size:14px; font-weight:800; color:#1E1B3A;\">KIPRIS 국내 특허 검색<\u002Fdiv><div style=\"font-size:12px; color:#908DA6; margin-top:2px;\">특허청 무료 검색 서비스<\u002Fdiv><\u002Fdiv>\n            <\u002Fa>\n            <a href=\"https://patents.google.com\" target=\"_blank\" style=\"text-decoration:none; background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px; display:flex; align-items:center; gap:14px;\">\n              <div style=\"width:44px; height:44px; flex:none; border-radius:12px; background:#EAF7F0; display:flex; align-items:center; justify-content:center; font-size:21px;\">🌐<\u002Fdiv>\n              <div><div style=\"font-size:14px; font-weight:800; color:#1E1B3A;\">Google Patents 해외 검색<\u002Fdiv><div style=\"font-size:12px; color:#908DA6; margin-top:2px;\">전 세계 특허·논문 검색<\u002Fdiv><\u002Fdiv>\n            <\u002Fa>\n          <\u002Fdiv>\n\n          <div style=\"font-size:14.5px; font-weight:800; margin:0 2px 12px;\">조사 결과 기록표<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:13px;\">\n            <sc-for list=\"{{ research }}\" as=\"r\" hint-placeholder-count=\"1\">\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n                <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:12px; flex-wrap:wrap;\">\n                  <span style=\"font-size:11.5px; font-weight:800; color:#5B3DDB; background:#F1EEFF; padding:4px 11px; border-radius:20px;\">{{ r.keyword }}<\u002Fspan>\n                  <span style=\"font-size:13.5px; font-weight:800; color:#2A2640;\">{{ r.name }}<\u002Fspan>\n                  <span style=\"font-size:11.5px; color:#A6A2B8; margin-left:auto;\">{{ r.url }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:10px;\">\n                  <div style=\"background:#FBFAFF; border-radius:11px; padding:11px 13px;\"><div style=\"font-size:11px; font-weight:800; color:#0E9F6E; margin-bottom:4px;\">비슷한 점<\u002Fdiv><div style=\"font-size:12.5px; color:#5A5670; line-height:1.55;\">{{ r.sim }}<\u002Fdiv><\u002Fdiv>\n                  <div style=\"background:#FBFAFF; border-radius:11px; padding:11px 13px;\"><div style=\"font-size:11px; font-weight:800; color:#6D4AFF; margin-bottom:4px;\">내 발명의 차별점<\u002Fdiv><div style=\"font-size:12.5px; color:#5A5670; line-height:1.55;\">{{ r.diff }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-top:10px; background:#FFFBF2; border:1px solid #F4E8C9; border-radius:11px; padding:11px 13px;\"><div style=\"font-size:11px; font-weight:800; color:#C99700; margin-bottom:4px;\">신규성·진보성 판단 메모<\u002Fdiv><div style=\"font-size:12.5px; color:#5A5670; line-height:1.55;\">{{ r.memo }}<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <button style=\"background:#fff; border:1.5px dashed #D7D2EE; border-radius:16px; padding:15px; font-size:13px; font-weight:700; color:#8B88A0;\">＋ 조사 기록 추가하기<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isSpec }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease; max-width:780px;\">\n          <div style=\"background:#FFFBF2; border:1px solid #F4E8C9; border-radius:14px; padding:13px 17px; margin-bottom:18px; font-size:12.5px; color:#9A7B00; line-height:1.6;\">\n            ⚠️ 이 명세서는 <b>초안<\u002Fb>입니다. 실제 출원 전에는 변리사 또는 전문가의 검토를 권장합니다.\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"font-size:11.5px; font-weight:800; color:#6D4AFF; margin-bottom:6px;\">발명의 명칭<\u002Fdiv>\n              <div style=\"font-size:16px; font-weight:800;\">{{ idea.title }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">기술분야<\u002Fdiv><span style=\"font-size:11px; color:#34C690; font-weight:800; background:#E6F6EF; padding:3px 9px; border-radius:20px;\">작성 완료<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#A6A2B8; margin-bottom:9px;\">이 발명이 어떤 기술 분야에 속하는지 설명하세요.<\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; color:#2A2640;\">{{ spec.technical_field }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">배경기술<\u002Fdiv><span style=\"font-size:11px; color:#34C690; font-weight:800; background:#E6F6EF; padding:3px 9px; border-radius:20px;\">작성 완료<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#A6A2B8; margin-bottom:9px;\">기존 기술·제품이 어떤 문제를 가지고 있었는지 설명하세요.<\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; color:#2A2640;\">{{ spec.background_art }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">해결하려는 과제<\u002Fdiv><span style=\"font-size:11px; color:#34C690; font-weight:800; background:#E6F6EF; padding:3px 9px; border-radius:20px;\">작성 완료<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11.5px; color:#A6A2B8; margin-bottom:9px;\">이 발명이 해결하고자 하는 핵심 문제를 적으세요.<\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; color:#2A2640;\">{{ spec.problem_to_solve }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">과제 해결 수단<\u002Fdiv><span style=\"font-size:11px; color:#34C690; font-weight:800; background:#E6F6EF; padding:3px 9px; border-radius:20px;\">작성 완료<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; color:#2A2640;\">{{ spec.solution }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">발명의 효과<\u002Fdiv><span style=\"font-size:11px; color:#34C690; font-weight:800; background:#E6F6EF; padding:3px 9px; border-radius:20px;\">작성 완료<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; color:#2A2640;\">{{ spec.effect }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">발명을 실시하기 위한 구체적인 내용<\u002Fdiv><span style=\"font-size:11px; color:#34C690; font-weight:800; background:#E6F6EF; padding:3px 9px; border-radius:20px;\">작성 완료<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13.5px; line-height:1.7; color:#2A2640;\">{{ spec.detailed_description }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#FBFAFF; border:1.5px dashed #D7D2EE; border-radius:16px; padding:18px 20px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;\"><div style=\"font-size:13.5px; font-weight:800;\">요약서<\u002Fdiv><span style=\"font-size:11px; color:#C2417A; font-weight:800; background:#FBEEF3; padding:3px 9px; border-radius:20px;\">작성 필요<\u002Fspan><\u002Fdiv>\n              <textarea value=\"{{ spec.abstract }}\" onchange=\"{{ specHandlers.abstract }}\" rows=\"3\" placeholder=\"발명의 핵심을 2~3문장으로 요약해 적어보세요.\" style=\"width:100%; border:1.5px solid #ECEAF6; border-radius:11px; padding:12px 14px; font-size:13.5px; line-height:1.6; color:#1E1B3A; outline:none; background:#fff;\"><\u002Ftextarea>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isClaims }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease; max-width:780px;\">\n          <div style=\"display:flex; align-items:center; gap:14px; background:linear-gradient(135deg,#F3F0FF,#fff); border:1px solid #E4DCFF; border-radius:18px; padding:16px 20px; margin-bottom:18px;\">\n            <div style=\"flex:none;\">{{ mascotLarge }}<\u002Fdiv>\n            <div style=\"font-size:13.5px; color:#5A5670; line-height:1.6;\">청구항은 내 발명을 보호하는 <b style=\"color:#5B3DDB;\">울타리<\u002Fb>예요. 너무 좁으면 쉽게 피해가고, 너무 넓으면 등록이 어려워요. <b>구성 요소<\u002Fb> 중심으로 적는 게 핵심이에요.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:14px;\">\n            <sc-for list=\"{{ claims }}\" as=\"cl\" hint-placeholder-count=\"2\">\n              <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; padding:18px 20px;\">\n                <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:12px;\">\n                  <span style=\"font-size:13px; font-weight:800; color:#5B3DDB;\">청구항 {{ cl.num }}<\u002Fspan>\n                  <span style=\"font-size:11px; font-weight:800; color:#6D4AFF; background:#F1EEFF; padding:3px 10px; border-radius:20px;\">{{ cl.type }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:13.5px; line-height:1.85; color:#2A2640; white-space:pre-wrap; font-family:'Pretendard'; background:#FBFAFF; border-radius:12px; padding:15px 17px;\">{{ cl.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:16px; background:#FFFBF2; border:1px solid #F4E8C9; border-radius:14px; padding:13px 17px; font-size:12.5px; color:#9A7B00; line-height:1.6;\">\n            ⚠️ 청구항은 권리 범위를 정하는 실제 법률 문서입니다. 출원 전 반드시 변리사 등 전문가의 검토를 받으세요.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isFiling }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease; max-width:780px;\">\n          <div style=\"background:linear-gradient(120deg,#6D4AFF,#9333EA); border-radius:18px; padding:22px 24px; color:#fff; margin-bottom:18px; display:flex; align-items:center; gap:18px;\">\n            <div style=\"position:relative; width:62px; height:62px; flex:none;\">\n              <svg width=\"62\" height=\"62\" viewBox=\"0 0 62 62\"><circle cx=\"31\" cy=\"31\" r=\"26\" fill=\"none\" stroke=\"rgba(255,255,255,.25)\" stroke-width=\"7\"><\u002Fcircle><circle cx=\"31\" cy=\"31\" r=\"26\" fill=\"none\" stroke=\"#fff\" stroke-width=\"7\" stroke-linecap=\"round\" stroke-dasharray=\"{{ filingDash }}\" transform=\"rotate(-90 31 31)\"><\u002Fcircle><\u002Fsvg>\n              <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800;\">{{ filingDone }}/{{ filingTotal }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:17px; font-weight:800; margin-bottom:4px;\">출원 준비 체크리스트<\u002Fdiv>\n              <div style=\"font-size:13px; opacity:.9; line-height:1.5;\">{{ filingTotal }}개 중 {{ filingDone }}개 완료! 남은 항목을 체크하며 마무리해요.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:8px; margin-bottom:20px;\">\n            <sc-for list=\"{{ filingItems }}\" as=\"f\" hint-placeholder-count=\"11\">\n              <button onclick=\"{{ f.onClick }}\" style=\"display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:13px 14px; border-radius:12px; background:none;\" style-hover=\"background:#FAF9FE;\">\n                <span style=\"width:24px; height:24px; flex:none; border-radius:8px; display:flex; align-items:center; justify-content:center; {{ f.boxStyle }}\">{{ f.check }}<\u002Fspan>\n                <span style=\"font-size:14px; font-weight:{{ f.weight }}; color:{{ f.color }};\">{{ f.label }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"font-size:14.5px; font-weight:800; margin:0 2px 12px;\">특허 출원 전체 흐름<\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:18px; padding:20px; margin-bottom:18px;\">\n            <div style=\"display:flex; flex-direction:column; gap:0;\">\n              <sc-for list=\"{{ flow }}\" as=\"fl\" hint-placeholder-count=\"10\">\n                <div style=\"display:flex; align-items:flex-start; gap:13px;\">\n                  <div style=\"display:flex; flex-direction:column; align-items:center; flex:none;\">\n                    <div style=\"width:26px; height:26px; border-radius:50%; background:{{ fl.dotBg }}; color:{{ fl.dotColor }}; display:flex; align-items:center; justify-content:center; font-size:11.5px; font-weight:800;\">{{ fl.n }}<\u002Fdiv>\n                    <div style=\"width:2px; flex:1; min-height:14px; background:{{ fl.lineBg }};\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:13.5px; font-weight:{{ fl.weight }}; color:{{ fl.color }}; padding-top:3px; padding-bottom:12px;\">{{ fl.label }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <button style=\"width:100%; background:linear-gradient(135deg,#6D4AFF,#9333EA); color:#fff; font-size:14.5px; font-weight:800; padding:15px; border-radius:14px; box-shadow:0 10px 22px rgba(109,74,255,.28); display:flex; align-items:center; justify-content:center; gap:9px;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v12\"><\u002Fpath><path d=\"M7 10l5 5 5-5\"><\u002Fpath><path d=\"M5 21h14\"><\u002Fpath><\u002Fsvg>\n            발명 문서 PDF로 내보내기\n          <\u002Fbutton>\n          <div style=\"margin-top:14px; background:#FBFAFF; border:1px dashed #DDD6F3; border-radius:14px; padding:14px 18px; font-size:11.5px; color:#908DA6; line-height:1.6;\">\n            실제 출원 절차와 비용은 변경될 수 있으니 <b>특허청 공식 자료(kipo.go.kr / kipris.or.kr)<\u002Fb>를 확인하세요. 본 서비스는 출원 성공 여부를 보장하지 않으며, 전문가 검토를 권장합니다.\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ isCoach }}\" hint-placeholder-val=\"\">\n        <div style=\"animation:fadeUp .35s ease; max-width:760px; display:flex; flex-direction:column; height:calc(100vh - 200px); min-height:460px;\">\n          <div style=\"flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding:4px 4px 10px;\">\n            <sc-for list=\"{{ coachMsgs }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <div style=\"{{ m.rowStyle }}\">\n                <sc-if value=\"{{ m.isCoach }}\" hint-placeholder-val=\"{{ true }}\">\n                  <div style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#FFF6D6; display:flex; align-items:center; justify-content:center; overflow:hidden;\">{{ m.avatar }}<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"{{ m.bubbleStyle }}\">{{ m.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ coachLoading }}\" hint-placeholder-val=\"\">\n              <div style=\"display:flex; gap:10px; align-items:flex-end;\">\n                <div style=\"width:34px; height:34px; flex:none; border-radius:50%; background:#FFF6D6; display:flex; align-items:center; justify-content:center;\">{{ mascotSmall }}<\u002Fdiv>\n                <div style=\"background:#fff; border:1px solid #ECEAF6; border-radius:16px; border-bottom-left-radius:5px; padding:14px 16px; display:flex; gap:5px;\">\n                  <span style=\"width:7px; height:7px; border-radius:50%; background:#B9B4D6; animation:blink 1.2s infinite;\"><\u002Fspan>\n                  <span style=\"width:7px; height:7px; border-radius:50%; background:#B9B4D6; animation:blink 1.2s .2s infinite;\"><\u002Fspan>\n                  <span style=\"width:7px; height:7px; border-radius:50%; background:#B9B4D6; animation:blink 1.2s .4s infinite;\"><\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <div style=\"flex:none; padding-top:10px;\">\n            <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:11px;\">\n              <sc-for list=\"{{ quickAsks }}\" as=\"q\" hint-placeholder-count=\"3\">\n                <button onclick=\"{{ q.onClick }}\" style=\"font-size:12px; font-weight:700; color:#5B3DDB; background:#fff; border:1px solid #E4DCFF; padding:8px 13px; border-radius:30px;\">{{ q.label }}<\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex; gap:9px; align-items:flex-end; background:#fff; border:1.5px solid #ECEAF6; border-radius:16px; padding:8px 8px 8px 16px;\">\n              <textarea value=\"{{ coachInput }}\" onchange=\"{{ setCoachInput }}\" onkeydown=\"{{ coachKey }}\" rows=\"1\" placeholder=\"발명·특허에 대해 무엇이든 물어보세요…\" style=\"flex:1; border:none; outline:none; resize:none; font-size:14px; line-height:1.5; color:#1E1B3A; padding:7px 0; background:none; max-height:120px;\"><\u002Ftextarea>\n              <button onclick=\"{{ sendCoach }}\" style=\"width:40px; height:40px; flex:none; border-radius:11px; background:linear-gradient(135deg,#6D4AFF,#9333EA); display:flex; align-items:center; justify-content:center;\">\n                <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:10.5px; color:#B6B2C6; text-align:center; margin-top:8px;\">AI 코치는 학습을 돕는 도구예요. 특허 가능성의 최종 판단은 선행기술조사와 전문가 검토가 필요합니다.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <!-- SCREEN-ANCHOR -->\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ isMobile }}\" hint-placeholder-val=\"\">\n    <nav style=\"position:fixed; bottom:0; left:0; right:0; z-index:40; background:#fff; border-top:1px solid #ECEAF6; display:flex; padding:7px 4px 9px;\">\n      <sc-for list=\"{{ mobileNav }}\" as=\"m\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ m.onClick }}\" style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:5px 0; color:{{ m.color }};\">\n          <span style=\"display:flex; width:22px; height:22px; align-items:center; justify-content:center;\">{{ m.icon }}<\u002Fspan>\n          <span style=\"font-size:10px; font-weight:700;\">{{ m.label }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'home',\n    isMobile: false,\n    learnTab: 'invention',\n    openConcept: 0,\n    quizSel: null,\n    quizDone: false,\n    activeSpec: 'technical_field',\n    coachInput: '',\n    coachLoading: false,\n    coachMsgs: [\n      { role: 'coach', text: '안녕하세요! 저는 발명 코치 \\u2018발명이\\u2019예요 \\uD83D\\uDCA1\\n발명이 특허가 될 수 있을지, 명세서·청구항을 어떻게 쓰는지 무엇이든 쉽게 알려드릴게요. 편하게 물어보세요!' },\n    ],\n    summaryLoading: false,\n    summary: '본 발명 \\u300C자동 우산 건조 보관함\\u300D은 젖은 우산으로 인한 실내 바닥 오염과 냄새 문제를 해결하기 위한 것으로, 우산을 거치하면 센서가 이를 감지해 송풍부가 자동으로 작동하여 우산을 건조하고 일정 시간 후 정지하는 것을 특징으로 한다. 이를 통해 실내 환경을 청결하게 유지하고 우산 보관의 편의성을 높일 수 있다.',\n    idea: {\n      title: '자동 우산 건조 보관함',\n      problem: '젖은 우산을 실내에 들고 들어오면 바닥에 물이 떨어져 미끄럽고, 우산에서 냄새와 곰팡이가 생긴다.',\n      existing: '기존 우산꽂이는 물을 받아두기만 해서 우산이 잘 마르지 않고, 고인 물 때문에 냄새와 곰팡이가 더 심해진다.',\n      core: '우산을 꽂으면 센서가 이를 감지해 자동으로 송풍이 작동하고, 일정 시간 뒤 멈추는 건조 겸용 보관함.',\n      how: '거치대에 우산을 꽂으면 적외선 센서가 감지하고, 제어부가 송풍팬을 작동시켜 바람으로 물기를 말린 뒤 타이머로 자동 정지한다.',\n      components: '우산 거치부, 송풍팬, 적외선 감지 센서, 제어 회로(제어부), 물받이 트레이, 전원부',\n      difference: '기존 우산꽂이는 단순 보관만 하지만, 본 발명은 감지+자동 송풍으로 건조까지 함께 수행한다.',\n      effect: '실내 바닥 오염 방지, 우산 냄새·곰팡이 감소, 보관 편의성 증가.',\n      field: '생활용품, 건물·매장 입구, 사무실·학교 현관',\n    },\n    keywords: ['우산 건조기', '접이식 우산 보관 장치', '송풍 우산 거치대', 'umbrella dryer', 'foldable umbrella drying device'],\n    research: [\n      { keyword: '우산 건조기', name: 'OO전자 가정용 우산 건조기 (제품)', url: 'kipris.or.kr', sim: '송풍으로 우산의 물기를 말린다는 점이 비슷함', diff: '본 발명은 센서로 우산을 자동 감지·정지하고 거치형 보관함과 결합된 점이 다름', memo: '신규성: 자동 감지+보관 결합 구조는 미확인 / 진보성 검토 필요' },\n    ],\n    spec: {\n      technical_field: '본 발명은 우산 건조 장치에 관한 것으로, 보다 상세하게는 거치된 우산을 센서로 감지하여 자동으로 송풍 건조하는 보관함에 관한 것이다.',\n      background_art: '종래의 우산꽂이는 우산을 단순히 거치·보관하는 기능만 제공하여, 젖은 우산의 물기가 자연 건조될 때까지 바닥에 물이 떨어지고 냄새와 곰팡이가 발생하는 문제가 있었다.',\n      problem_to_solve: '본 발명은 젖은 우산으로 인한 실내 바닥 오염과 냄새·곰팡이 발생 문제를 해결하고, 별도의 조작 없이 우산을 자동으로 건조하는 것을 목적으로 한다.',\n      solution: '상기 과제를 해결하기 위하여 본 발명은 우산을 거치하는 거치부; 거치된 우산을 감지하는 센서부; 우산에 공기를 공급하는 송풍부; 및 센서부의 신호에 따라 송풍부를 제어하는 제어부를 포함한다.',\n      effect: '본 발명에 따르면 우산이 자동으로 건조되어 실내 바닥 오염과 냄새를 방지하고, 사용자가 별도 조작 없이 우산을 깔끔하게 보관할 수 있다.',\n      detailed_description: '거치부(100)에 우산이 꽂히면 센서부(200)가 이를 감지하여 제어부(400)에 신호를 전달한다. 제어부(400)는 송풍부(300)를 작동시켜 우산에 바람을 공급하며, 설정된 시간이 지나면 송풍부(300)의 작동을 정지한다.',\n      abstract: '',\n    },\n    claims: [\n      { type: '독립항', text: '우산을 거치하는 거치부;\\n상기 거치부에 거치된 우산을 감지하는 센서부;\\n상기 우산에 공기를 공급하는 송풍부; 및\\n상기 센서부의 신호에 따라 상기 송풍부의 작동을 제어하는 제어부;\\n를 포함하는, 자동 우산 건조 보관함.' },\n      { type: '종속항', text: '제1항에 있어서,\\n상기 제어부는 설정된 시간이 경과하면 상기 송풍부의 작동을 자동으로 정지시키는 것을 특징으로 하는, 자동 우산 건조 보관함.' },\n    ],\n    filing: [\n      { key: 'title', label: '발명 제목 정리', done: true },\n      { key: 'abstract', label: '발명 요약 작성', done: true },\n      { key: 'drawings', label: '도면 준비', done: false },\n      { key: 'spec', label: '명세서 초안 작성', done: true },\n      { key: 'claims', label: '청구항 초안 작성', done: true },\n      { key: 'prior', label: '선행기술조사', done: true },\n      { key: 'applicant', label: '출원인 정보 확인', done: true },\n      { key: 'inventor', label: '발명자 정보 확인', done: true },\n      { key: 'fee', label: '수수료 확인', done: false },\n      { key: 'online', label: '특허청 전자출원 방법 확인', done: false },\n      { key: 'expert', label: '변리사 상담 여부 확인', done: false },\n    ],\n  };\n\n  componentDidMount() {\n    const mq = window.matchMedia('(max-width: 860px)');\n    const apply = () => this.setState({ isMobile: mq.matches });\n    apply();\n    mq.addEventListener('change', apply);\n  }\n\n  go(screen) { this.setState({ screen }); try { window.scrollTo(0, 0); } catch (e) {} }\n\n  ic(paths, size) {\n    const arr = Array.isArray(paths) ? paths : [paths];\n    return React.createElement('svg', { width: size || 19, height: size || 19, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.9, strokeLinecap: 'round', strokeLinejoin: 'round' },\n      arr.map((d, i) => React.createElement('path', { key: i, d })));\n  }\n\n  icons() {\n    return {\n      home: ['M3 10.5 12 3l9 7.5', 'M5 10v10h14V10', 'M9.5 20v-6h5v6'],\n      learn: ['M3 7l9-4 9 4-9 4-9-4z', 'M7 9.5V14c0 1.4 2.2 2.5 5 2.5s5-1.1 5-2.5V9.5', 'M21 7v5'],\n      idea: ['M9 18h6', 'M10 21h4', 'M12 3a6 6 0 00-4 10c.8.9 1 1.7 1 3h6c0-1.3.2-2.1 1-3a6 6 0 00-4-10z'],\n      research: ['M11 4a7 7 0 100 14 7 7 0 000-14z', 'M20 20l-3.6-3.6'],\n      spec: ['M7 3h7l5 5v13H7z', 'M14 3v5h5', 'M9.5 13h6', 'M9.5 17h6'],\n      claims: ['M12 3l8 3v6c0 5-3.4 8.2-8 9-4.6-.8-8-4-8-9V6z'],\n      filing: ['M4 5a1 1 0 011-1h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1z', 'M8 12l3 3 5-6'],\n      coach: ['M4 5a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2H9l-5 4z'],\n    };\n  }\n\n  mascot(size) {\n    const s = size || 108;\n    return React.createElement('svg', { width: s, height: s, viewBox: '0 0 120 120', fill: 'none' }, [\n      React.createElement('ellipse', { key: 'g', cx: 60, cy: 110, rx: 30, ry: 5, fill: 'rgba(0,0,0,.12)' }),\n      React.createElement('path', { key: 'b', d: 'M60 16c-19 0-32 14-32 31 0 11 6 19 12 25 3 3 4 6 4 10h32c0-4 1-7 4-10 6-6 12-14 12-25 0-17-13-31-32-31z', fill: '#FFE36E', stroke: '#F2B705', strokeWidth: 3 }),\n      React.createElement('path', { key: 'h', d: 'M40 30c4-6 11-10 20-10', stroke: '#FFF3B0', strokeWidth: 5, strokeLinecap: 'round' }),\n      React.createElement('rect', { key: 'n', x: 46, y: 84, width: 28, height: 16, rx: 5, fill: '#C9CEDA' }),\n      React.createElement('rect', { key: 'n2', x: 49, y: 100, width: 22, height: 9, rx: 4.5, fill: '#9AA1B2' }),\n      React.createElement('circle', { key: 'e1', cx: 51, cy: 56, r: 4.6, fill: '#3A2E00' }),\n      React.createElement('circle', { key: 'e2', cx: 69, cy: 56, r: 4.6, fill: '#3A2E00' }),\n      React.createElement('circle', { key: 'g1', cx: 52.6, cy: 54.3, r: 1.5, fill: '#fff' }),\n      React.createElement('circle', { key: 'g2', cx: 70.6, cy: 54.3, r: 1.5, fill: '#fff' }),\n      React.createElement('path', { key: 'm', d: 'M54 64c2.2 2.4 9.8 2.4 12 0', stroke: '#3A2E00', strokeWidth: 3, strokeLinecap: 'round' }),\n      React.createElement('circle', { key: 'c1', cx: 42, cy: 64, r: 4, fill: '#FF9D8A', opacity: .55 }),\n      React.createElement('circle', { key: 'c2', cx: 78, cy: 64, r: 4, fill: '#FF9D8A', opacity: .55 }),\n    ]);\n  }\n\n  navItems() {\n    const I = this.icons();\n    return [\n      { key: 'home', label: '홈', icon: 'home' },\n      { key: 'learn', label: '개념 학습', icon: 'learn' },\n      { key: 'idea', label: '내 아이디어', icon: 'idea' },\n      { key: 'research', label: '선행기술조사', icon: 'research' },\n      { key: 'spec', label: '명세서 작성', icon: 'spec' },\n      { key: 'claims', label: '청구항 작성', icon: 'claims' },\n      { key: 'filing', label: '출원 준비', icon: 'filing', badge: '4' },\n      { key: 'coach', label: 'AI 코치', icon: 'coach' },\n    ].map(n => {\n      const active = this.state.screen === n.key;\n      return {\n        label: n.label,\n        icon: this.ic(I[n.icon], 19),\n        badge: n.badge || '',\n        onClick: () => this.go(n.key),\n        btnStyle: `display:flex; align-items:center; gap:12px; width:100%; text-align:left; padding:10px 12px; border-radius:12px; font-size:13.5px; font-weight:${active ? 800 : 600}; color:${active ? '#5B3DDB' : '#5A5670'}; background:${active ? '#F1EEFF' : 'transparent'};`,\n      };\n    });\n  }\n\n  titles() {\n    return {\n      home: ['발명노트 홈', '아이디어를 특허로 만드는 여정을 한눈에'],\n      learn: ['개념 학습', '발명과 특허의 기본을 카드로 배워요'],\n      idea: ['내 발명 아이디어 정리', '질문에 답하면 발명 요약이 만들어져요'],\n      research: ['선행기술조사', '내 발명이 이미 있는지 확인해요'],\n      spec: ['명세서 작성', '특허 명세서 초안을 항목별로 작성해요'],\n      claims: ['청구항 작성', '내 발명을 보호하는 울타리를 만들어요'],\n      filing: ['출원 준비', '출원 전 준비물을 체크리스트로 확인해요'],\n      coach: ['AI 발명 코치', '막힐 때 코치 \\u2018발명이\\u2019에게 물어보세요'],\n    };\n  }\n\n  steps() {\n    const data = [\n      { label: '발명 개념', key: 'learn' },\n      { label: '특허 개념', key: 'learn' },\n      { label: '아이디어 정리', key: 'idea' },\n      { label: '선행기술조사', key: 'research' },\n      { label: '명세서 작성', key: 'spec' },\n      { label: '청구항 작성', key: 'claims' },\n      { label: '출원 준비', key: 'filing' },\n    ];\n    const cur = 3;\n    return data.map((d, i) => {\n      const done = i < cur, isCur = i === cur;\n      return {\n        label: d.label,\n        onClick: () => this.go(d.key),\n        dotLabel: done ? '✓' : String(i + 1),\n        lineColor: i < cur ? '#8B5CF6' : '#E7E4F4',\n        textColor: done || isCur ? '#3A3651' : '#A6A2B8',\n        dotStyle: done ? 'background:#8B5CF6; color:#fff;' : isCur ? 'background:#fff; color:#6D4AFF; border:2.5px solid #6D4AFF;' : 'background:#EDEBF7; color:#A6A2B8;',\n      };\n    });\n  }\n\n  ideaList() {\n    return [\n      { emoji: '☂️', iconBg: '#E8EEFF', title: '자동 우산 건조 보관함', problem: '젖은 우산으로 실내 바닥이 젖고 냄새가 나는 문제', status: '명세서 작성 중', statusStyle: 'background:#E6F6EF; color:#0E9F6E;', onClick: () => this.go('spec') },\n      { emoji: '🪑', iconBg: '#FFF1E6', title: '책상 부착형 자세 알림 장치', problem: '공부할 때 자세가 구부정해져 목·허리가 아픈 문제', status: '아이디어 단계', statusStyle: 'background:#FBEEF3; color:#C2417A;', onClick: () => this.go('idea') },\n    ];\n  }\n\n  setIdea(field, v) { this.setState(s => ({ idea: { ...s.idea, [field]: v } })); }\n  setSpec(field, v) { this.setState(s => ({ spec: { ...s.spec, [field]: v } })); }\n\n  ideaHandlers() {\n    const fields = ['title', 'problem', 'existing', 'core', 'how', 'components', 'difference', 'effect', 'field'];\n    const h = {};\n    fields.forEach(f => { h[f] = (e) => this.setIdea(f, e.target.value); });\n    return h;\n  }\n\n  async genSummary() {\n    this.setState({ summaryLoading: true });\n    const i = this.state.idea;\n    const prompt = `너는 한국 발명 교육 코치다. 아래 발명 정보를 바탕으로 특허 명세서의 \\uC694\\uC57D\\uC11C 느낌의 \\uBC1C\\uBA85 \\uC694\\uC57D\\uBB38을 4~5문장으로, 쉽고 자연스러운 한국어로 작성해줘. 머리말 없이 본문만.\\n\\n제목: ${i.title}\\n해결 문제: ${i.problem}\\n핵심 아이디어: ${i.core}\\n작동 방식: ${i.how}\\n차별점: ${i.difference}\\n효과: ${i.effect}`;\n    try {\n      const out = await window.claude.complete(prompt);\n      this.setState({ summary: (out || '').trim(), summaryLoading: false });\n    } catch (e) {\n      this.setState({ summaryLoading: false });\n    }\n  }\n\n  toggleFiling(key) { this.setState(s => ({ filing: s.filing.map(f => f.key === key ? { ...f, done: !f.done } : f) })); }\n\n  setQuiz(i) { if (!this.state.quizDone) this.setState({ quizSel: i }); }\n  checkQuiz() { this.setState({ quizDone: true }); }\n  resetQuiz() { this.setState({ quizSel: null, quizDone: false }); }\n\n  setCoachInput(e) { this.setState({ coachInput: e.target.value }); }\n\n  async sendCoach(quick) {\n    const text = (quick || this.state.coachInput).trim();\n    if (!text || this.state.coachLoading) return;\n    const i = this.state.idea;\n    const history = this.state.coachMsgs.concat([{ role: 'user', text }]);\n    this.setState({ coachMsgs: history, coachInput: '', coachLoading: true });\n    const sys = `너는 한국 중·고등학생도 이해할 수 있게 설명하는 친절한 발명·특허 코치 \\u2018발명이\\u2019다. 쉬운 말로, 격려하는 말투로, 2~4문단 이내로 답한다. 법적 확정은 피하고 \\uD544\\uC694\\uC2DC \\u201C\\uCD5C\\uC885 \\uD310\\uB2E8\\uC740 \\uC120\\uD589\\uAE30\\uC220\\uC870\\uC0AC\\uC640 \\uC804\\uBB38\\uAC00 \\uAC80\\uD1A0\\uAC00 \\uD544\\uC694\\uD574\\uC694\\u201D\\uB77C\\uACE0 \\uC548\\uB0B4\\uD55C\\uB2E4. 이모지는 1~2개만. 사용자의 현재 발명은 \\u300C${i.title}\\u300D(${i.core})이다.`;\n    const msgs = [{ role: 'user', content: sys + '\\n\\n첫 질문: ' + text }];\n    const conv = history.filter(m => m.role !== 'coach' || history.indexOf(m) !== 0).map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text }));\n    try {\n      const out = await window.claude.complete({ messages: [{ role: 'user', content: sys }, { role: 'assistant', content: '네, 발명이가 도와드릴게요!' }].concat(conv) });\n      this.setState(s => ({ coachMsgs: s.coachMsgs.concat([{ role: 'coach', text: (out || '').trim() }]), coachLoading: false }));\n    } catch (e) {\n      this.setState(s => ({ coachMsgs: s.coachMsgs.concat([{ role: 'coach', text: '앗, 지금 답변을 불러오지 못했어요. 잠시 후 다시 시도해 주세요!' }]), coachLoading: false }));\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const t = this.titles()[s.screen] || ['', ''];\n    return {\n      isMobile: s.isMobile,\n      showSidebar: !s.isMobile,\n      screenTitle: t[0],\n      screenSub: t[1],\n      nav: this.navItems(),\n      mobileNav: [\n        { key: 'home', label: '홈', icon: 'home' },\n        { key: 'learn', label: '학습', icon: 'learn' },\n        { key: 'idea', label: '아이디어', icon: 'idea' },\n        { key: 'spec', label: '명세서', icon: 'spec' },\n        { key: 'coach', label: '코치', icon: 'coach' },\n      ].map(n => ({ label: n.label, icon: this.ic(this.icons()[n.icon], 21), onClick: () => this.go(n.key), color: s.screen === n.key ? '#6D4AFF' : '#A6A2B8' })),\n      mascotLarge: this.mascot(112),\n      gridCols: s.isMobile ? '1fr' : 'repeat(2, minmax(0,1fr))',\n      isHome: s.screen === 'home',\n      isLearn: s.screen === 'learn',\n      isIdea: s.screen === 'idea',\n      isResearch: s.screen === 'research',\n      isSpec: s.screen === 'spec',\n      isClaims: s.screen === 'claims',\n      isFiling: s.screen === 'filing',\n      isCoach: s.screen === 'coach',\n      steps: this.steps(),\n      ideaList: this.ideaList(),\n      idea: s.idea,\n      ideaHandlers: this.ideaHandlers(),\n      summary: s.summary,\n      summaryLoading: s.summaryLoading,\n      genSummary: () => this.genSummary(),\n      keywords: s.keywords,\n      research: s.research,\n      spec: s.spec,\n      specHandlers: { abstract: (e) => this.setSpec('abstract', e.target.value) },\n      activeSpec: s.activeSpec,\n      claims: s.claims.map((c, i) => ({ num: i + 1, type: c.type, text: c.text })),\n      mascotSmall: this.mascot(30),\n      filingItems: s.filing.map(f => ({\n        label: f.label,\n        onClick: () => this.toggleFiling(f.key),\n        check: f.done ? '✓' : '',\n        weight: f.done ? 700 : 600,\n        color: f.done ? '#1E1B3A' : '#6A6680',\n        boxStyle: f.done ? 'background:#6D4AFF; color:#fff; font-size:13px; font-weight:800;' : 'background:#fff; border:1.8px solid #DCD8EE;',\n      })),\n      filingDash: (() => { const done = s.filing.filter(f => f.done).length; const C = 2 * Math.PI * 26; const p = done / s.filing.length; return `${(C * p).toFixed(1)} ${C.toFixed(1)}`; })(),\n      flow: ['아이디어 정리', '선행기술조사', '명세서 작성', '청구항 작성', '도면 준비', '출원서 작성', '특허청 전자출원', '심사청구', '심사 대응', '등록 또는 거절'].map((label, i) => {\n        const cur = 3, done = i < cur, isCur = i === cur, last = i === 9;\n        return {\n          n: done ? '✓' : String(i + 1), label,\n          dotBg: done ? '#8B5CF6' : isCur ? '#fff' : '#EDEBF7',\n          dotColor: done ? '#fff' : isCur ? '#6D4AFF' : '#A6A2B8',\n          lineBg: last ? 'transparent' : i < cur ? '#C9B8FF' : '#E7E4F4',\n          weight: done || isCur ? 800 : 600,\n          color: done || isCur ? '#2A2640' : '#A6A2B8',\n        };\n      }),\n      quickAsks: [\n        { label: '이 아이디어가 발명이 될까?', onClick: () => this.sendCoach('제 아이디어가 발명으로 볼 수 있을까요?') },\n        { label: '내 발명의 차별점은?', onClick: () => this.sendCoach('제 발명의 차별점이 뭔지 정리해 주세요.') },\n        { label: '배경기술 어떻게 써?', onClick: () => this.sendCoach('명세서의 배경기술은 어떻게 써야 하나요?') },\n        { label: '청구항 쉽게 설명해줘', onClick: () => this.sendCoach('청구항이 뭔지 쉽게 설명해 주세요.') },\n      ],\n      filing: s.filing,\n      filingDone: s.filing.filter(f => f.done).length,\n      filingTotal: s.filing.length,\n      goIdea: () => this.go('idea'),\n      goCoach: () => this.go('coach'),\n      goLearn: () => this.go('learn'),\n      goFiling: () => this.go('filing'),\n      coachMsgs: s.coachMsgs.map((m, i) => ({\n        text: m.text,\n        isCoach: m.role === 'coach',\n        rowStyle: `display:flex; gap:10px; align-items:flex-end; ${m.role === 'coach' ? '' : 'flex-direction:row-reverse;'}`,\n        bubbleStyle: `max-width:74%; padding:12px 15px; border-radius:16px; font-size:13.5px; line-height:1.62; white-space:pre-wrap; ${m.role === 'coach' ? 'background:#fff; border:1px solid #ECEAF6; border-bottom-left-radius:5px; color:#2A2640;' : 'background:linear-gradient(135deg,#6D4AFF,#8B5CF6); color:#fff; border-bottom-right-radius:5px;'}`,\n        avatar: m.role === 'coach' ? this.mascot(34) : null,\n      })),\n      coachInput: s.coachInput,\n      coachLoading: s.coachLoading,\n      setCoachInput: (e) => this.setCoachInput(e),\n      sendCoach: () => this.sendCoach(),\n      coachKey: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); this.sendCoach(); } },\n      askQuick: (q) => this.sendCoach(q),\n      learnTab: s.learnTab,\n      learnTabs: [\n        { label: '발명 기본', active: s.learnTab === 'invention', onClick: () => this.setState({ learnTab: 'invention' }) },\n        { label: '특허 기본', active: s.learnTab === 'patent', onClick: () => this.setState({ learnTab: 'patent' }) },\n      ].map(x => ({ label: x.label, onClick: x.onClick, style: `flex:1; padding:10px 14px; border-radius:11px; font-size:13.5px; font-weight:800; ${x.active ? 'background:#fff; color:#5B3DDB; box-shadow:0 2px 8px rgba(91,61,219,.14);' : 'background:transparent; color:#8B88A0;'}` })),\n      conceptList: this.conceptList(),\n      quiz: this.quizView(),\n    };\n  }\n\n  conceptList() {\n    const inv = [\n      { ico: '💡', t: '발명이란 무엇인가요?', b: '기술적인 문제를 해결하는, 새롭고 쓸모 있는 아이디어를 구체적인 방법으로 만든 것이에요.' },\n      { ico: '🔍', t: '발견과 발명의 차이', b: '발견은 원래 있던 것을 찾아내는 것, 발명은 없던 해결책을 새로 만들어내는 것이에요.' },\n      { ico: '✅', t: '좋은 발명의 조건', b: '① 새로워야 하고 ② 실제로 만들 수 있어야 하고 ③ 누군가에게 도움이 되어야 해요.' },\n      { ico: '🧩', t: '발명의 기본 구조', b: '문제 발견 → 해결 방법 → 효과. 이 세 가지로 정리하면 발명이 또렷해져요.' },\n      { ico: '🌱', t: '아이디어를 찾는 방법', b: '생활 속 불편함을 적어보세요. 작은 불편함 하나가 멋진 발명이 될 수 있어요.' },\n      { ico: '🔧', t: '불편함을 발명으로', b: '\"왜 이건 항상 불편하지?\"라고 물으면 해결 아이디어가 보이기 시작해요.' },\n    ];\n    const pat = [\n      { ico: '📜', t: '특허란 무엇인가요?', b: '발명을 일정 기간 독점해서 쓸 수 있도록 국가가 주는 권리예요.' },\n      { ico: '⚖️', t: '특허·실용신안·디자인·상표', b: '특허는 기술, 실용신안은 작은 기술 개선, 디자인은 모양, 상표는 이름·로고를 보호해요.' },\n      { ico: '🎯', t: '특허를 받는 3가지 조건', b: '산업상 이용가능성, 신규성(새로움), 진보성(쉽게 떠올리기 어려움)이 필요해요.' },\n      { ico: '🗂️', t: '선행기술이란?', b: '내 발명 전에 이미 공개된 기술이에요. 출원 전에 꼭 확인해야 해요.' },\n      { ico: '📝', t: '명세서와 청구항', b: '명세서는 발명 설명서, 청구항은 보호 범위를 정하는 울타리예요.' },\n      { ico: '🔄', t: '출원 → 심사 → 등록 흐름', b: '출원 → 심사청구 → 심사 → 등록 또는 거절 순서로 진행돼요.' },\n    ];\n    return (this.state.learnTab === 'invention' ? inv : pat);\n  }\n\n  quizView() {\n    const q = {\n      question: '발명과 발견의 차이로 가장 알맞은 것은?',\n      options: [\n        '발명은 원래 있던 것을 찾아내는 것이다',\n        '발견과 발명은 똑같은 말이다',\n        '발명은 없던 해결책을 새로 만드는 것, 발견은 원래 있던 것을 찾는 것이다',\n        '발명은 모양을, 발견은 이름을 보호한다',\n      ],\n      answer: 2,\n    };\n    const s = this.state;\n    return {\n      question: q.question,\n      done: s.quizDone,\n      canCheck: s.quizSel !== null && !s.quizDone,\n      checkStyle: (s.quizSel !== null && !s.quizDone) ? 'background:#6D4AFF; color:#fff;' : 'background:#EDEBF7; color:#A6A2B8; cursor:default;',\n      check: () => this.checkQuiz(),\n      reset: () => this.resetQuiz(),\n      resultText: s.quizDone ? (s.quizSel === q.answer ? '정답이에요! 🎉 발명은 새로운 해결책을 만드는 일이에요.' : '아쉬워요! 정답은 ③번 — 발명은 없던 해결책을 새로 만드는 것이에요.') : '',\n      resultStyle: s.quizDone ? (s.quizSel === q.answer ? 'background:#E6F6EF; color:#0E9F6E; border:1px solid #BFE9D5;' : 'background:#FDECEC; color:#D14343; border:1px solid #F6C9C9;') : '',\n      options: q.options.map((o, i) => {\n        const sel = s.quizSel === i;\n        let style = 'border:1.5px solid #ECEAF6; background:#fff; color:#3A3651;';\n        if (!s.quizDone && sel) style = 'border:1.5px solid #6D4AFF; background:#F1EEFF; color:#5B3DDB;';\n        if (s.quizDone && i === q.answer) style = 'border:1.5px solid #34C690; background:#E6F6EF; color:#0E8F62;';\n        if (s.quizDone && sel && i !== q.answer) style = 'border:1.5px solid #ED9A9A; background:#FDECEC; color:#C73B3B;';\n        return {\n          label: ['①', '②', '③', '④'][i] + ' ' + o,\n          onClick: () => this.setQuiz(i),\n          style: `text-align:left; width:100%; padding:13px 15px; border-radius:13px; font-size:13.5px; font-weight:600; ${style}`,\n        };\n      }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
